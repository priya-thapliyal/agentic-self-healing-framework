name: CI Self-Healing Test Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Google Chrome & System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          google-chrome-stable \
          libnss3 \
          libxss1 \
          libasound2t64 \
          fonts-liberation \
          libgbm1 \
          libx11-6 \
          libxext6 \
          libxrandr2 \
          xdg-utils \
          xvfb

    - name: Run Chrome Diagnostics
      run: |
        echo "=== Chrome Binary Check ==="
        which google-chrome-stable
        google-chrome-stable --version
        
        echo "=== System Resources ==="
        free -h
        df -h /dev/shm
        
        echo "=== Required Libraries ==="
        ldd /usr/bin/google-chrome-stable | grep "not found" || echo "✓ All libraries found"
        
        echo "=== Chrome Dry Run Test ==="
        timeout 5 google-chrome-stable --headless --disable-gpu --no-sandbox about:blank 2>&1 || true

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Maven Tests
      run: mvn test -Dtest=DashboardTest -X
      continue-on-error: true
      env:
        GITHUB_ACTIONS: "true"

    - name: Process Telemetry Data
      run: python3 process_telemetry.py
      env:
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_RUN_NUMBER: ${{ github.run_number }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_WORKFLOW: ${{ github.workflow }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}

    - name: Install Allure CLI
      run: |
        sudo npm install -g allure-commandline --save-dev
        allure --version

    - name: Generate Allure Report
      run: allure generate target/allure-results --clean -o target/allure-report

    - name: Deploy to Dashboard Data Branch
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        mkdir -p ../temp_dashboard_data
        cp -r dashboard-data/* ../temp_dashboard_data/ 2>/dev/null || true
        rm -rf dashboard-data
        
        git fetch origin dashboard-data || true
        if git show-ref --verify --quiet refs/remotes/origin/dashboard-data; then
          git checkout dashboard-data --
        else
          git checkout --orphan dashboard-data
          git rm -rf .
          echo "[]" > history.json
        fi
        
        mkdir -p runs
        cp -r ../temp_dashboard_data/* . 2>/dev/null || true
        
        git add .
        git commit -m "Update dashboard data: Run ${{ github.run_number }}" || true
        git push origin dashboard-data
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Allure Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: target/allure-report
        retention-days: 7

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./target/allure-report
        publish_branch: gh-pages
